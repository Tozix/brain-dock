name: CI

on:
  push:
    branches: [main]
  pull_request:

# prisma generate (db:generate) resolves DATABASE_URL at config load — generate does not connect.
env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install
        run: bun install
      - name: Lint · typecheck · test
        run: bun run ci
