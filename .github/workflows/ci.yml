name: CI

on:
  push:
    branches: [main]
  pull_request:

# prisma generate (db:generate) resolves DATABASE_URL at config load — generate does not connect.
env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint · typecheck · test
        run: bun run ci

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: brain_dock
          POSTGRES_PASSWORD: brain_dock
          POSTGRES_DB: brain_dock
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U brain_dock -d brain_dock"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
      qdrant:
        image: qdrant/qdrant:v1.18.2
        ports: ['6333:6333']
    env:
      DATABASE_URL: postgresql://brain_dock:brain_dock@localhost:5432/brain_dock?schema=public
      QDRANT_URL: http://localhost:6333
      REDIS_URL: redis://localhost:6379
      OLLAMA_URL: http://localhost:11434
      EMBEDDER: deterministic
      # Required by ConfigService when the REST e2e boots the full app (not production).
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install
        run: bun install --frozen-lockfile
      - name: Generate Prisma client
        run: bun run db:generate
      - name: Wait for Qdrant
        run: |
          for _ in $(seq 1 30); do
            curl -sf http://localhost:6333/readyz && break
            sleep 1
          done
      - name: Apply migrations
        run: bun run db:deploy
      - name: e2e (real Postgres + Qdrant)
        # --no-addons: the REST e2e boots AppModule → bullmq (native msgpackr) which panics otherwise.
        run: RUN_E2E=1 bun --no-addons test apps/api/src/e2e
      - name: MCP e2e
        run: RUN_E2E=1 bun test apps/mcp
