# brain-dock — host nginx (домен brain-dock.ru, TLS через certbot).
# Контейнеры публикуются только на 127.0.0.1: web :3300, api :3100, mcp :8080.
#
# Установка:
#   sudo cp deploy/nginx/brain-dock.ru.conf /etc/nginx/sites-available/brain-dock.ru
#   sudo ln -s /etc/nginx/sites-available/brain-dock.ru /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d brain-dock.ru -d www.brain-dock.ru   # выпустит сертификат и допишет ssl_*
#   sudo nginx -t && sudo systemctl reload nginx

# Лимит на загрузку индексируемых файлов (upload-индексация) — синхронизировано с
# INDEX_UPLOAD_MAX_TOTAL_BYTES (50 МБ) + запас на JSON-обёртку.
client_max_body_size 64m;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name brain-dock.ru www.brain-dock.ru;

    # certbot http-01
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://brain-dock.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name brain-dock.ru www.brain-dock.ru;

    # --- TLS (пути создаст certbot; до его запуска секция закомментирована не нужна:
    # certbot --nginx сам впишет/поправит эти строки) ---
    ssl_certificate     /etc/letsencrypt/live/brain-dock.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brain-dock.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # www → апекс
    if ($host = www.brain-dock.ru) {
        return 301 https://brain-dock.ru$request_uri;
    }

    # Безопасность (API сам ставит свои заголовки; здесь — для статики/SPA)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── REST API (NestJS, контейнер api) ──────────────────────────────
    location /api/v1/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # синхронная upload-индексация больших папок
        proxy_send_timeout 300s;
    }

    # readiness для мониторинга (по желанию закройте allow/deny)
    location = /health/ready {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
    }

    # /metrics НЕ проксируется наружу — скрейпьте изнутри хоста (127.0.0.1:3100/metrics).

    # ── Hosted MCP (Streamable HTTP: POST + SSE-стримы) ───────────────
    location /mcp {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;          # SSE: отдавать события сразу
        proxy_cache off;
        proxy_read_timeout 600s;      # долгие tool-вызовы / стримы
        proxy_send_timeout 600s;
        client_max_body_size 8m;      # тело MCP-запроса (сервер сам режет по MCP_MAX_BODY_BYTES)
    }

    # ── Web UI (SPA, контейнер web) ───────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3300;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
