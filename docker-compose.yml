# brain-dock — infrastructure + app services (production-first).
#
# Infra (Postgres, Qdrant, Redis, Ollama) publishes NO host ports here: it is reachable only over
# the internal Compose network by the app containers. Only the app services that the host nginx
# proxies — api (:3100), web (:3300), mcp (:8080) — bind a 127.0.0.1 host port. workers/migrate/
# ollama-pull need no host port at all.
#
# App services sit behind the `app` profile and are built on the server at deploy time (no registry):
#   docker compose --profile app up -d --build     (or set COMPOSE_PROFILES=app in .env)
#
# Local dev (app run from source via bun) needs infra reachable on the host — for that, and ONLY
# that, add the dev override which re-publishes infra ports:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d     (= `bun run infra:up`)
#
# Postgres credentials come from POSTGRES_USER/POSTGRES_PASSWORD/POSTGRES_DB (defaults below).

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '3'

services:
  postgres:
    image: postgres:17-alpine
    container_name: brain-dock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brain_dock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brain_dock}
      POSTGRES_DB: ${POSTGRES_DB:-brain_dock}
    # No host port — reachable only as `postgres:5432` inside the Compose network.
    # (docker-compose.dev.yml re-publishes 127.0.0.1:15432 for local dev.)
    volumes:
      - postgres-data:/var/lib/postgresql/data
    logging: *default-logging
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.18.2
    container_name: brain-dock-qdrant
    restart: unless-stopped
    # No host port — reachable only as `qdrant:6333` inside the Compose network.
    # (docker-compose.dev.yml re-publishes 127.0.0.1:16333/16334 for local dev.)
    volumes:
      - qdrant-data:/qdrant/storage
    logging: *default-logging
    healthcheck:
      # The qdrant image ships no curl/wget, but it does have bash — probe the HTTP port via /dev/tcp.
      test: ['CMD', 'bash', '-c', ':> /dev/tcp/127.0.0.1/6333']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: brain-dock-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    # No host port — reachable only as `redis:6379` inside the Compose network.
    # (docker-compose.dev.yml re-publishes 127.0.0.1:16379 for local dev.)
    volumes:
      - redis-data:/data
    logging: *default-logging
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:0.30.7
    container_name: brain-dock-ollama
    restart: unless-stopped
    # No host port — reachable only as `ollama:11434` inside the Compose network.
    # (docker-compose.dev.yml re-publishes 127.0.0.1:11434 for local dev.)
    volumes:
      - ollama-data:/root/.ollama
    mem_limit: 4g
    logging: *default-logging
    healthcheck:
      # `ollama list` talks to the local server — fails until the API is up.
      test: ['CMD', 'ollama', 'list']
      interval: 10s
      timeout: 5s
      retries: 10

  # --- App services (profile `app`) — built on the host, not pulled from a registry. ---
  # `environment` overrides .env with in-network service DNS (the .env URLs point at host ports).

  # One-shot: apply Prisma migrations before the API starts, then exit.
  migrate:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: brain-dock-migrate
    restart: 'no'
    command: ['bun', 'run', 'db:deploy']
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-brain_dock}:${POSTGRES_PASSWORD:-brain_dock}@postgres:5432/${POSTGRES_DB:-brain_dock}?schema=public
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot: pre-pull the embedding model into the ollama server. Nothing depends on it, so an
  # offline deploy still comes up — a failed pull only logs an error in this container.
  ollama-pull:
    profiles: ['app']
    image: ollama/ollama:0.30.7
    container_name: brain-dock-ollama-pull
    restart: 'no'
    entrypoint: ['sh', '-c', 'ollama pull ${EMBEDDING_MODEL:-nomic-embed-text}']
    environment:
      OLLAMA_HOST: http://ollama:11434
    logging: *default-logging
    depends_on:
      ollama:
        condition: service_healthy

  api:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: brain-dock-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      API_PORT: '3100'
      DATABASE_URL: postgresql://${POSTGRES_USER:-brain_dock}:${POSTGRES_PASSWORD:-brain_dock}@postgres:5432/${POSTGRES_DB:-brain_dock}?schema=public
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      # Upload-and-index staging — written here, indexed + deleted by the workers container.
      INDEX_STAGING_DIR: /var/lib/brain-dock/staging
    ports:
      - '127.0.0.1:3100:3100'
    mem_limit: 1g
    volumes:
      # Shared with `workers` so the worker can index (then delete) what the API staged.
      - index-staging:/var/lib/brain-dock/staging
    logging: *default-logging
    healthcheck:
      # oven/bun has no curl — probe the root-level /health endpoint with bun itself.
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://localhost:3100/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  workers:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: brain-dock-workers
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-brain_dock}:${POSTGRES_PASSWORD:-brain_dock}@postgres:5432/${POSTGRES_DB:-brain_dock}?schema=public
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    # 2g (not 1g): ts-morph holds whole source trees in memory while indexing large repositories.
    mem_limit: 2g
    volumes:
      # Same staging volume the API writes uploaded files into (path matches INDEX_STAGING_DIR;
      # upload jobs carry an absolute path under it).
      - index-staging:/var/lib/brain-dock/staging
    logging: *default-logging
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # Web UI (SPA) — static build served by a tiny Bun server; host nginx terminates TLS
  # and proxies / → web, /api/v1 → api, /mcp → mcp (deploy/nginx/brain-dock.ru.conf).
  web:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: brain-dock-web
    restart: unless-stopped
    environment:
      WEB_PORT: '3300'
    ports:
      - '127.0.0.1:3300:3300'
    logging: *default-logging
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://localhost:3300/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Hosted MCP over Streamable HTTP — clients connect with their API key + X-Project header.
  mcp:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/mcp/Dockerfile
    container_name: brain-dock-mcp
    restart: unless-stopped
    command: ['bun', 'run', 'apps/mcp/src/http.ts']
    env_file: .env
    environment:
      NODE_ENV: production
      MCP_HTTP_PORT: '8080'
      DATABASE_URL: postgresql://${POSTGRES_USER:-brain_dock}:${POSTGRES_PASSWORD:-brain_dock}@postgres:5432/${POSTGRES_DB:-brain_dock}?schema=public
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    ports:
      - '127.0.0.1:8080:8080'
    logging: *default-logging
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - "fetch('http://localhost:8080/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      migrate:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
  ollama-data:
  # Upload-and-index staging, shared between `api` (writer) and `workers` (indexer + cleaner).
  index-staging:
