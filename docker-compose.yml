# brain-dock — local infrastructure + (optional) app services.
# Local-first: Postgres, Qdrant, Redis, Ollama. Start infra with `bun run infra:up`.
# App services (api, workers) live behind the `app` profile and are built on the host at deploy
# time — no image registry: `bun run deploy` (= docker compose --profile app up -d --build).

services:
  postgres:
    image: postgres:17-alpine
    container_name: brain-dock-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: brain_dock
      POSTGRES_PASSWORD: brain_dock
      POSTGRES_DB: brain_dock
    ports:
      - '15432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U brain_dock -d brain_dock']
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    container_name: brain-dock-qdrant
    restart: unless-stopped
    ports:
      - '16333:6333'
      - '16334:6334'
    volumes:
      - qdrant-data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: brain-dock-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '16379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: brain-dock-ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama-data:/root/.ollama

  # --- App services (profile `app`) — built on the host, not pulled from a registry. ---
  # `environment` overrides .env with in-network service DNS (the .env URLs point at host ports).

  # One-shot: apply Prisma migrations before the API starts, then exit.
  migrate:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: brain-dock-migrate
    restart: 'no'
    command: ['bun', 'run', 'db:deploy']
    environment:
      DATABASE_URL: postgresql://brain_dock:brain_dock@postgres:5432/brain_dock?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  api:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: brain-dock-api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      API_PORT: '3000'
      DATABASE_URL: postgresql://brain_dock:brain_dock@postgres:5432/brain_dock?schema=public
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    ports:
      - '3000:3000'
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

  workers:
    profiles: ['app']
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
    container_name: brain-dock-workers
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://brain_dock:brain_dock@postgres:5432/brain_dock?schema=public
      REDIS_URL: redis://redis:6379
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
  ollama-data:
